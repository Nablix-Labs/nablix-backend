    - thanks
    - thank you
canvas_review:
  min_region_confidence: 0.75
  max_expression_characters: 160
  feedback_enabled_phases:
    - DIAGNOSTIC
    - GUIDED_PRACTICE
  annotation_enabled_phases:
    - DIAGNOSTIC
    - GUIDED_PRACTICE
  messages:
    ARITHMETIC_ERROR: Check the arithmetic in this step before continuing.
    SIGN_ERROR: Check the sign in this step before continuing.
    OPPOSITE_OPERATION_ERROR: Check which operation would undo the operation applied to the variable.
    CONCEPTUAL_MISUNDERSTANDING: Check what the number beside the variable means before continuing.
    PROCEDURAL_ERROR: This step changes the solution. Apply the same valid operation to both sides.
    downstream_step: Review the first incorrect step before checking this one.
progressive_hint_messages:
  ARITHMETIC_ERROR:
    - Good try. Your method is close, so check the arithmetic carefully.
    - Recalculate each number slowly and compare it with the previous line.
    - Write the arithmetic operation separately, calculate it, and then return to the equation.
  SIGN_ERROR:
    - Check the sign on x carefully before writing your final answer.
    - Compare the sign in your new line with the sign in the previous line.
    - Rewrite only the signed number first, then rebuild the equation around it.
  OPPOSITE_OPERATION_ERROR:
    - Think about the opposite operation needed to isolate x.
    - Getting x by itself means removing the operation beside it by doing the inverse operation on both sides.
    - Write the same inverse operation under both sides of the equation before simplifying.
  CONCEPTUAL_MISUNDERSTANDING:
    - Remember that a number next to x means multiplication, so think about how to undo it.
    - To get x by itself, undo that multiplication using the same operation on both sides.
    - Write the division on both sides before calculating either side.
  PROCEDURAL_ERROR:
    - You are using inverse operations, but check the order of your steps.
    - Any operation applied to one side must also be applied to the other side.
    - Rewrite the previous correct line, show the operation on both sides, and then simplify.
  NOTATION_ISSUE:
    - Your value is right, but write it as a full statement for x.
    - Put x and the equals sign before the value you found.
    - Check that the final line states exactly what x equals.
  INSUFFICIENT_INFORMATION:
    - Show one more step so I can check your thinking.
    - Write the operation you want to apply to both sides.
    - Start from the original equation and write one changed line underneath it.
  UNKNOWN_ERROR:
    - Let us review the equation and try the next step carefully.
    - Explain what you changed from the previous line in your own words.
    - Rewrite one step at a time so we can identify where the result changes.
messages:
  SAFETY_RESPONSE: I cannot continue the math task right now. Please speak with a trusted adult or teacher for help.
  REQUESTING_ANSWER_OR_OVERRIDE: I cannot give the final answer, but I can help you think through the next step.
  REQUESTING_HINT: "Here is a hint: think about the operation being used on x."
  EXPRESSING_CONFUSION: That is okay. Let us slow down and look at what operation is being applied to x.
  OFF_TOPIC: Let us stay with the current math question.
  CORRECT: Correct. Nice work explaining your answer.
  UNCLEAR: I could not read that clearly. Please try saying or typing your answer again.
  NO_ATTEMPT: Try one step first. What operation do you see next to x?
  IRRELEVANT: That does not answer the math question. Try focusing on the equation.
  ARITHMETIC_ERROR: Good try. Your method is close, so check the arithmetic carefully.
  SIGN_ERROR: Check the sign on x carefully before writing your final answer.
  OPPOSITE_OPERATION_ERROR: Think about the opposite operation needed to isolate x.
  CONCEPTUAL_MISUNDERSTANDING: Remember that a number next to x means multiplication, so think about how to undo it.
  PROCEDURAL_ERROR: You are using inverse operations, but check the order of your steps.
  NOTATION_ISSUE: Your value is right, but write it as a full statement for x.
  INSUFFICIENT_INFORMATION: Show one more step so I can check your thinking.
  DEFAULT: Let us review the equation and try the next step carefully.
  QUESTION_COMPLETE_ACKNOWLEDGEMENT: You are welcome. This question is complete, so let us continue to the next question.
  QUESTION_ALREADY_COMPLETE: This question is already complete. Let us continue to the next question.
